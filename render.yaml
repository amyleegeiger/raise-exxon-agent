services:
  - type: web
    name: raise-exxon-agent
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WORKLLAMA_URL
        value: https://app.workllama.com
      - key: WORKLLAMA_EMAIL
        sync: false
      - key: WORKLLAMA_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
